name: gelato-web-ci

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "packages/**"
      - "public/**"
      - "Dockerfile"
      - "package.json"
      - "next.config.ts"
      - ".github/workflows/gelato-web-ci.yml"
  workflow_dispatch: {}

concurrency:
  group: gelato-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push-and-update-gitops:
    name: Build Web image and update GitOps tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    if: "${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore(gitops): update gelato-web') }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Validate Web build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api

      - name: Set image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ghcr.io/94manuel/gelato-web:${{ steps.vars.outputs.image_tag }}
            ghcr.io/94manuel/gelato-web:latest

      - name: Update Web production image tag
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.vars.outputs.image_tag }}|" k8s/overlays/prod/kustomization.yaml
          git diff -- k8s/overlays/prod/kustomization.yaml

      - name: Commit GitOps Web tag
        run: |
          if git diff --quiet -- k8s/overlays/prod/kustomization.yaml; then
            echo "No GitOps change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "chore(gitops): update gelato-web image to ${{ steps.vars.outputs.image_tag }}"
          git push
