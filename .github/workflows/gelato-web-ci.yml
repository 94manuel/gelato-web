name: gelato-web-ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/overlays/prod/kustomization.yaml"
      - "README.md"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/94manuel/gelato-web

jobs:
  build-and-deploy:
    name: Build, push and update GitOps tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="sha-${SHORT_SHA}"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          echo "Image tag: ${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Recomendado:
      # Crea el secret GHCR_TOKEN en GitHub con un Personal Access Token classic
      # con permisos: write:packages, read:packages y repo.
      #
      # Ruta:
      # GitHub > gelato-web > Settings > Secrets and variables > Actions
      # Name: GHCR_TOKEN
      # Value: TU_TOKEN
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: 94manuel
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        shell: bash
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ steps.vars.outputs.image_tag }}" \
            -t "${IMAGE_NAME}:latest" \
            .

      - name: Push Docker image
        shell: bash
        run: |
          docker push "${IMAGE_NAME}:${{ steps.vars.outputs.image_tag }}"
          docker push "${IMAGE_NAME}:latest"

      - name: Update production Kustomize image tag
        shell: bash
        run: |
          if [ ! -f "k8s/overlays/prod/kustomization.yaml" ]; then
            echo "ERROR: k8s/overlays/prod/kustomization.yaml not found"
            exit 1
          fi

          sed -i "s|newTag: .*|newTag: ${{ steps.vars.outputs.image_tag }}|g" k8s/overlays/prod/kustomization.yaml

          echo "Updated kustomization:"
          cat k8s/overlays/prod/kustomization.yaml

      - name: Commit GitOps image tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/overlays/prod/kustomization.yaml

          git commit -m "chore(gitops): deploy gelato-web ${{ steps.vars.outputs.image_tag }} [skip ci]" || echo "No changes to commit"
          git push