name: gelato-web-ci

on:
  push:
    branches:
      - main
    paths-ignore:
      - "k8s/overlays/prod/kustomization.yaml"
      - "README.md"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/94manuel/gelato-web

jobs:
  build-and-deploy:
    name: Build and publish gelato-web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -t $IMAGE_NAME:${{ steps.vars.outputs.tag }} \
            -t $IMAGE_NAME:latest \
            .

      - name: Push image
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.tag }}
          docker push $IMAGE_NAME:latest

      - name: Update production kustomization image tag
        run: |
          sed -i "s|newTag: .*|newTag: ${{ steps.vars.outputs.tag }}|g" k8s/overlays/prod/kustomization.yaml

      - name: Commit deployment tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "chore(gitops): deploy ${{ steps.vars.outputs.tag }} [skip ci]" || echo "No changes to commit"
          git push