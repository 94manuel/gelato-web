apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: ghcr.io/94manuel/gelato-web
    newName: gelato-web
    newTag: local
patches:
  - target:
      kind: Deployment
      name: gelato-web
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/0/configMapRef/name
        value: gelato-web-config
